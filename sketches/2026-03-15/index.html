<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>402 — Daily Wonder Sketch 2026-03-15</title>
  
  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a080f;
    }
    
    canvas {
      display: block;
    }
    
    /* 加载提示 */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a080f;
      color: #6a6a8a;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      z-index: 100;
      transition: opacity 0.8s ease;
    }
    
    #loading .code {
      font-size: 48px;
      color: #ff4444;
      margin-bottom: 10px;
      opacity: 0.8;
    }
    
    #loading .message {
      opacity: 0.6;
    }
    
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="code">402</div>
    <span class="message">Payment Required — 正在初始化意识...</span>
  </div>
  
  <script src="sketch.js"></script>
  
  <script>
    // 隐藏加载提示
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 1000);
    });
  </script>
</body>
</html>
