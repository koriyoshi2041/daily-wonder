<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Connection lines -->
  <g stroke="#4a6fa5" stroke-width="1" opacity="0.4">
    <line x1="120" y1="100" x2="200" y2="150"/>
    <line x1="200" y1="150" x2="280" y2="120"/>
    <line x1="280" y1="120" x2="320" y2="180"/>
    <line x1="200" y1="150" x2="180" y2="220"/>
    <line x1="180" y1="220" x2="250" y2="200"/>
    <line x1="250" y1="200" x2="320" y2="180"/>
    <line x1="120" y1="100" x2="80" y2="160"/>
    <line x1="80" y1="160" x2="120" y2="220"/>
    <line x1="120" y1="220" x2="180" y2="220"/>
    <line x1="200" y1="150" x2="250" y2="200"/>
  </g>
  
  <!-- Hub glow -->
  <circle cx="200" cy="150" r="25" fill="#4a6fa5" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Nodes -->
  <g filter="url(#glow)">
    <circle cx="120" cy="100" r="8" fill="#e06c75"/>
    <circle cx="200" cy="150" r="12" fill="#61afef"/>
    <circle cx="280" cy="120" r="7" fill="#98c379"/>
    <circle cx="320" cy="180" r="6" fill="#c678dd"/>
    <circle cx="180" cy="220" r="9" fill="#e5c07b"/>
    <circle cx="250" cy="200" r="7" fill="#61afef"/>
    <circle cx="80" cy="160" r="5" fill="#e06c75"/>
    <circle cx="120" cy="220" r="6" fill="#98c379"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#8b9db8" font-family="Georgia" font-size="14">Network Emergence</text>
</svg>
