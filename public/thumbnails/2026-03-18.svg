<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- 机器人粒子（方形，冷色） -->
  <g opacity="0.5">
    <rect x="50" y="80" width="5" height="5" fill="#4a5568" transform="rotate(15 52 82)"/>
    <rect x="85" y="120" width="4" height="4" fill="#4a5568" transform="rotate(45 87 122)"/>
    <rect x="120" y="60" width="6" height="6" fill="#3d4852"/>
    <rect x="300" y="180" width="4" height="4" fill="#4a5568" transform="rotate(30 302 182)"/>
    <rect x="250" y="100" width="5" height="5" fill="#3d4852"/>
    <rect x="180" y="200" width="4" height="4" fill="#4a5568"/>
    <rect x="320" y="80" width="5" height="5" fill="#4a5568" transform="rotate(60 322 82)"/>
    <rect x="70" y="220" width="4" height="4" fill="#3d4852"/>
    <rect x="150" y="150" width="3" height="3" fill="#4a5568"/>
    <rect x="280" y="240" width="5" height="5" fill="#4a5568"/>
  </g>
  
  <!-- 人类粒子（圆形，暖色，发光） -->
  <g filter="url(#glow)">
    <circle cx="100" cy="150" r="8" fill="#f6ad55"/>
    <circle cx="200" cy="100" r="6" fill="#ed8936"/>
    <circle cx="280" cy="160" r="10" fill="#f6ad55"/>
    <circle cx="150" cy="230" r="7" fill="#fbb040"/>
    <circle cx="340" cy="120" r="5" fill="#ed8936"/>
    <circle cx="60" cy="180" r="6" fill="#f6ad55"/>
    <circle cx="220" cy="200" r="9" fill="#fbb040"/>
  </g>
  
  <!-- 被放大的人类粒子（更亮） -->
  <circle cx="200" cy="150" r="15" fill="#ffefd5" opacity="0.3"/>
  <circle cx="200" cy="150" r="12" fill="#fbb040" filter="url(#glow)"/>
  <circle cx="200" cy="150" r="8" fill="#fff"/>
  
  <!-- 标题 -->
  <text x="20" y="280" fill="#718096" font-family="system-ui, sans-serif" font-size="12">Signal & Noise — 2026.03.18</text>
  
  <!-- 51/49 标签 -->
  <g>
    <rect x="300" y="20" width="80" height="25" rx="4" fill="#1a2332" opacity="0.8"/>
    <text x="315" y="37" fill="#4a5568" font-family="system-ui, sans-serif" font-size="11">51%</text>
    <text x="345" y="37" fill="#f6ad55" font-family="system-ui, sans-serif" font-size="11">49%</text>
  </g>
</svg>
